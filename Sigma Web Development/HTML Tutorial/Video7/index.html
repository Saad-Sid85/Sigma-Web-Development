<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline & Block elements</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Paragraph is an block element, it takes whole width and does'nt allow the next element to enter in their area-->
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Commodi, dolorem recusandae. Illum error tenetur nobis?
    </p>


    <!-- Anchor tag is an inline element, they take only the needed spacce neither more nor less.-->
    <a href="google.com">Google</a>


    <!-- Div container appears in the new line always -->
    <div>I'm a block element</div>


    <!-- Span is like the div tag but it is inline element -->
    <span>I'm an span </span>
    <a href="">Yes it's an inline element</a>

    
</body>

</html>
