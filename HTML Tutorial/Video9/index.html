<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio and Vedio Tags</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Audio,Vedio and SVG are the inline elements Tags -->

    <video src="Reel.mp4" height="355" width="555" controls poster="YOUR NAME.jpeg">Reel</video>
    <!-- Poster is basically used to attach an bg image across the vedio,like a thumbnail-->
    <!-- Loop attribute is used to repeat again and again -->
    <!-- Muted is used to mute the audio -->
    <!-- Autoplay is used to play the vedio without any externsal indication -->
    <audio src="Jeene Laga Hoon.mpeg" controls></audio>


    <!-- What is SVG?
SVG stands for Scalable Vector Graphics. Unlike raster images like PNGs or JPGs, SVGs are not pixel-based. They're composed of vectors—mathematical formulas that describe shapes, paths, and fills. This means SVGs can be resized without losing quality. -->

    <svg width="100" height="100">
  <rect width="80" height="80" stroke="black" stroke-width="3" fill="green"/>
</svg>

<svg width="100" height="100">
  <circle cx="40" cy="40" r="30" fill="blue"/>
</svg>


<!-- What is an iFrame?
An iFrame is an HTML element that enables an inline frame for the embedding of external content. Essentially, you can load another web page within a designated area of your current webpage. -->

<iframe width="560" height="315" src="https://www.youtube.com/embed/XZwBNDGuWGU?si=h85NnMPBBD8-MNe1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>

</html>
