<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image,List and Table</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- IMAGES -->
    <img height="230" src="photo.jpeg" alt="Aesthetic Image">

    <!-- TABLES -->
    <table>
        <caption>STUDENT DETAILS</caption>
        <thead>
            <!-- header counter -->
            HEADER
        <tbody>
            <!-- tr: stands for the table row -->
            <tr>
                <!-- th: stands for the table heading (supposed to use only once in a single table) -->
                <th>NAME</th>
                <th>AGE</th>
                <th>CONTACT</th>
            </tr>
        </tbody>
        </thead>


        <tr>
            <!-- td: stands for the table data. -->
            <td>Saad</td>
            <td>21</td>
            <td>8528979105</td>
        </tr>
        <tr>
            <!-- colspan: used to mere a data in a single line -->
            <td colspan="2">Ali</td>
            <td>29</td>
            <td>7653746268</td>
        </tr>
    </table>
    <tfoot>
        <!-- footer counter -->
        FOOTER
        <tr>
            <!-- td: stands for the table data. -->
            <td>Vikas</td>
            <td>21</td>
            <td>986554335</td>
        </tr>
    </tfoot>


    <!-- LIST -->
    <!-- 1. Unordered list -->
    <ul type="square">
        <li>Saad</li>
        <li>Ali</li>
        <li>Vikas</li>
    </ul>

    <!-- 2. Ordered list -->
    <ol type="A">
        <li>Saad</li>
        <li>Ali</li>
        <li>Vikas</li>
    </ol>

</body>

</html>
