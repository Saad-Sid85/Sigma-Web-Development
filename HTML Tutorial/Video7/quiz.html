<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Without using the br tag, write a vertically aligned form asking for the name , city and pincode of a user.-->
     <h1>FORM FOR USER</h1>
<form action="post">
    <div>
        <label for="name">Enter your name:</label>
        <input type="text" id="name" placeholder="Please enter your name">
    </div>

    <div>
        <label for="city">Enter your city:</label>
        <select name="city" id="city">
            <option value="Lucnkow">LUCKNOW</option>
            <option value="Barabanki">BARABANKI</option>
            <option value="Varanasi">VARANASI</option>
            <option value="Baliya">BALIA</option>
        </select>
    </div>

    <div>
        <label for="password">Enter your pincode:</label>
        <input type="password" name="ps" id="pass" placeholder="Please enter your password">
    </div>
</form>

</body>
</html>
